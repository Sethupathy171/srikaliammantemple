<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaliamman Temple</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
    --gold1:#FFD700;
    --gold2:#ffae00;
    --maroon:#3b0000;
    --dark:#0a0000;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Noto Serif',serif;
    background:linear-gradient(to bottom,var(--maroon),var(--dark));
    color:var(--gold1);
}

/* HEADER */
header{
    background:linear-gradient(to right,#2b0000,#4b0000);
    border-bottom:2px solid var(--gold2);
    position:sticky;
    top:0;
    z-index:1000;
}

.container{
    width:90%;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 0;
}

.logo{
    font-size:22px;
    background:linear-gradient(45deg,var(--gold1),var(--gold2));
    -webkit-background-clip:text;
    color:transparent;
}

/* NAV */
nav a{
    margin-left:15px;
    color:var(--gold1);
    text-decoration:none;
}

nav a:hover{
    color:white;
}

/* BUTTON */
.btn{
    margin-left:15px;
    background:linear-gradient(45deg,var(--gold1),var(--gold2));
    color:black;
    border:none;
    padding:6px 12px;
    border-radius:20px;
    cursor:pointer;
}

/* HERO */
.hero{
    height:55vh;
    background:url('https://lh3.googleusercontent.com/gps-cs-s/APNQkAF3raO5ya0N0_rk-rBd32RUkvE0-9g23ITFipAJDReDdtJr0ejBoPjq0BMS_z-5_L2ygo9zintveP58RWaCtJ62IvzLKYolgq-gqxkzGwkjWycdGqO77Hk08E3WPtGYyk6Qe3Tz-_yj4mg=s680-w680-h510-rw') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.hero-content{
    z-index:1;
}

.hero h1{
    font-size:32px;
}

/* SECTION */
.section{
    padding:60px 20px;
    width:90%;
    margin:auto;
    overflow:hidden;
}

h2{
    border-bottom:2px solid var(--gold2);
    margin-bottom:20px;
}

/* CARD */
.card{
    background:rgba(255,215,0,0.08);
    border:1px solid var(--gold2);
    padding:20px;
    border-radius:10px;
}

/* ===== FIXED SLIDER ===== */
.slider{
    width:80%;
    max-width:800px;
    height:260px;
    margin:40px auto;
    position:relative;
    overflow:hidden;
    border-radius:15px;
    border:3px solid var(--gold2);
    box-shadow:0 0 25px rgba(255,215,0,0.5);
}

.slides{
    position:relative;
    width:100%;
    height:100%;
}

.slides img{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 1s ease-in-out;
}

.slides img.active{
    opacity:1;
}

/* BUTTONS */
.prev,.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:linear-gradient(45deg,var(--gold1),var(--gold2));
    color:black;
    border:none;
    padding:8px 12px;
    border-radius:50%;
    cursor:pointer;
    z-index:10;
}

.prev{left:10px;}
.next{right:10px;}

/* MAP */
iframe{
    border-radius:10px;
    border:2px solid var(--gold2);
}

/* QR */
.qr{
    text-align:center;
    margin-top:20px;
}

.qr img{
    background:white;
    padding:10px;
    border-radius:10px;
    border:2px solid var(--gold2);
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    border-top:2px solid var(--gold2);
    background:#1a0000;
}

/* MOBILE */
@media(max-width:768px){
    .slider{height:200px;}
}
</style>
</head>

<body>

<header>
<div class="container">
    <div class="logo" id="title">Kaliamman Temple</div>

    <nav>
        <a href="#home" id="nav1">Home</a>
        <a href="#about" id="nav2">About</a>
        <a href="#gallery" id="nav3">Gallery</a>
        <a href="#contact" id="nav4">Contact</a>
        <button class="btn" onclick="toggleLang()">தமிழ்</button>
    </nav>
</div>
</header>

<!-- HERO -->
<section class="hero" id="home">
    <div class="hero-content">
        <h1 id="hero_text">🔱 Om Sakthi Kaliamman 🔱</h1>
    </div>
</section>

<!-- ABOUT -->
<section class="section" id="about">
    <h2 id="about_title">About Temple</h2>
    <div class="card" id="about_text">
        Kaliamman Temple is a sacred place for divine blessings.
    </div>
</section>

<!-- SLIDER -->
<section class="section" id="gallery">
    <h2 id="gallery_title">Gallery</h2>

    <div class="slider">
        <div class="slides" id="slides">
            <img src="https://i.ytimg.com/vi/XtW8GlpuBUM/hqdefault.jpg">
            <img src="https://lh3.googleusercontent.com/gps-cs-s/APNQkAF3raO5ya0N0_rk-rBd32RUkvE0-9g23ITFipAJDReDdtJr0ejBoPjq0BMS_z-5_L2ygo9zintveP58RWaCtJ62IvzLKYolgq-gqxkzGwkjWycdGqO77Hk08E3WPtGYyk6Qe3Tz-_yj4mg=s680-w680-h510-rw">
            <img src="https://i.ytimg.com/vi/D9BKdH9tBq0/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLBZU2eg2Yjqrtc9yP_NZC0_8kBlSQ">
        </div>

        <button class="prev" onclick="moveSlide(-1)">‹</button>
        <button class="next" onclick="moveSlide(1)">›</button>
    </div>
</section>

<!-- CONTACT -->
<section class="section" id="contact">
    <h2 id="contact_title">Contact</h2>

    <div class="card">
        <p id="loc">📍 Tamil Nadu</p>
        <p id="ph">📞 +91 9876543210</p>
    </div>

    <div style="margin-top:20px;">
        <iframe 
        src="https://www.google.com/maps?q=Kaliamman%20Temple%20Tamil%20Nadu&output=embed"
        width="100%" height="300"></iframe>
    </div>

    <div class="qr">
        <h3>Scan for Location</h3>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://maps.app.goo.gl/C5U9j1kLiJTs6ZVr5">
    </div>
</section>

<footer>
    <p>© 2026 Kaliamman Temple</p>
</footer>

<script>
let index=0;
const slides=document.querySelectorAll("#slides img");

function showSlide(i){
    slides.forEach(img=>img.classList.remove("active"));
    slides[i].classList.add("active");
}

function moveSlide(step){
    index=(index+step+slides.length)%slides.length;
    showSlide(index);
}

setInterval(()=>{moveSlide(1);},3000);

/* LANGUAGE */
let tamil=false;
function toggleLang(){
    tamil=!tamil;

    if(tamil){
        title.innerText="காளியம்மன் கோவில்";
        nav1.innerText="முகப்பு";
        nav2.innerText="பற்றி";
        nav3.innerText="புகைப்படங்கள்";
        nav4.innerText="தொடர்பு";
        hero_text.innerText="🔱 ஓம் சக்தி காளியம்மன் 🔱";
        about_title.innerText="கோவில் பற்றி";
        about_text.innerText="இது பக்தர்களுக்கு அருள் தரும் புனித கோவில்.";
        gallery_title.innerText="புகைப்படங்கள்";
        contact_title.innerText="தொடர்பு";
        loc.innerText="📍 தமிழ்நாடு";
        ph.innerText="📞 +91 9876543210";
    } else {
        location.reload();
    }
}
</script>

</body>
</html>
